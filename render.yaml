services:
  - type: web
    name: socialsync-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: standard
    envVars:
      - key: PORT
        value: 10000
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: PIP_NO_CACHE_DIR
        value: "1"
    healthCheckPath: /health
    autoDeploy: true
